# ── Server ────────────────────────────────────────────────────────────────────
server.port=8081

# ── Database (Oracle 11g XE) ──────────────────────────────────────────────────
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:XE
spring.datasource.username=plant_disease_db
spring.datasource.password=Rakesh28
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# ── Connection Pool (HikariCP) ────────────────────────────────────────────────
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000

# ── JPA / Hibernate (Oracle 11g compatible) ───────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.globally_quoted_identifiers=false
spring.jpa.properties.id.new_generator_mappings=false

# ── File Upload ───────────────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=plantDiseaseDetectionSecretKey256BitsLongForSecurity!
jwt.expiration=86400000

# ── Flask ML Service ──────────────────────────────────────────────────────────
flask.service.url=http://localhost:5001

# ── CORS ──────────────────────────────────────────────────────────────────────
cors.allowed.origins=http://localhost:3000

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.plantdisease=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=DEBUG